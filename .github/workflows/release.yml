name: CI / Release

on:
  push:
    branches: ["**"]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"          # v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-*"        # v1.2.3-rc.1
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: ${{ startsWith(github.ref, 'refs/tags/v') && 'Build, publish & release' || 'Build & test' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create GitHub Release (tag runs only)
      packages: write      # push to GHCR        (tag runs only)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Docker setup ──────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only authenticate on tag pushes — avoids wasting a token on PRs/branches
      - name: Log in to GitHub Container Registry
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Derive semver tags from the git tag ───────────────────────────────────
      # Given tag v1.2.3 this produces:
      #   ghcr.io/<owner>/<repo>:1.2.3
      #   ghcr.io/<owner>/<repo>:1.2
      #   ghcr.io/<owner>/<repo>:1
      #   ghcr.io/<owner>/<repo>:latest   (only for stable, non-prerelease tags)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=vider
            org.opencontainers.image.description=Instagram video downloader

      # ── Build (all runs) / push (tag runs only) ───────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      # ── Smoke-test the image (non-tag runs only) ──────────────────────────────
      - name: Smoke test container
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: |
          docker run --rm -d --name vider-test -p 8000:8000 \
            $(echo "${{ steps.meta.outputs.tags }}" | head -1)
          # Wait up to 15 s for the server to be ready
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/ > /dev/null 2>&1; then break; fi
            sleep 1
          done
          curl -sf http://localhost:8000/ | grep -i "vider\|instagram" || \
            (echo "Smoke test failed" && exit 1)
          docker stop vider-test

      # ── GitHub Release (tag runs only) ────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
