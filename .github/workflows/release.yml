name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"          # v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-*"        # v1.2.3-rc.1

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Build & publish Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create GitHub Release
      packages: write      # push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Docker setup ──────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Derive semver tags from the git tag ───────────────────────────────────
      # Given tag v1.2.3 this produces:
      #   ghcr.io/<owner>/<repo>:1.2.3
      #   ghcr.io/<owner>/<repo>:1.2
      #   ghcr.io/<owner>/<repo>:1
      #   ghcr.io/<owner>/<repo>:latest   (only for stable, non-prerelease tags)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=vider
            org.opencontainers.image.description=Instagram video downloader

      # ── Build & push ──────────────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
